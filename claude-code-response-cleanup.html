<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Code Response Cleanup</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family:
          Helvetica,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Arial,
          sans-serif;
        line-height: 1.6;
        max-width: 980px;
        margin: 0 auto;
        padding: 20px;
        color: #24292e;
        background: #ffffff;
      }
      h1 {
        border-bottom: 1px solid #eaecef;
        padding-bottom: 0.3em;
        margin-top: 0;
        font-size: 32px;
        font-weight: 600;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: #0366d6;
        text-decoration: none;
        font-size: 14px;
      }
      .back-link:hover {
        text-decoration: underline;
      }
      .description {
        font-size: 14px;
        color: #586069;
        margin-bottom: 20px;
        padding: 12px;
        background: #f6f8fa;
        border-radius: 6px;
        border: 1px solid #e1e4e8;
      }
      .section-label {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
        display: block;
        color: #24292e;
      }
      .input-section {
        margin-bottom: 20px;
      }
      textarea {
        width: 100%;
        min-height: 200px;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 13px;
        padding: 12px;
        border: 1px solid #e1e4e8;
        border-radius: 6px;
        background: #ffffff;
        color: #24292e;
        resize: vertical;
      }
      textarea:focus {
        outline: none;
        border-color: #0366d6;
      }
      .output-section {
        margin-top: 4px;
      }
      .output-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      pre {
        background: #f6f8fa;
        border: 1px solid #e1e4e8;
        border-radius: 6px;
        padding: 12px;
        white-space: pre-wrap;
        word-wrap: break-word;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 13px;
        min-height: 50px;
        margin: 0;
        color: #24292e;
      }
      .button-row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 12px;
      }
      button {
        background: #0366d6;
        color: #fff;
        padding: 8px 16px;
        border-radius: 6px;
        border: 1px solid rgba(27, 31, 35, 0.15);
        cursor: pointer;
        font-size: 14px;
        line-height: 20px;
        font-family:
          Helvetica,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Arial,
          sans-serif;
      }
      button:hover {
        background: #0256c5;
      }
      button.secondary {
        background: #fafbfc;
        color: #24292e;
        border: 1px solid rgba(27, 31, 35, 0.15);
      }
      button.secondary:hover {
        background: #f3f4f6;
      }
      .copied-msg {
        font-size: 13px;
        color: #2e7d32;
        font-weight: 600;
        display: none;
      }
      .copied-msg.visible {
        display: inline;
      }
    </style>
  </head>
  <body>
    <a href="index.html" class="back-link">← Back</a>
    <h1>Claude Code Response Cleanup</h1>
    <div class="description">
      Paste terminal output from Claude Code to fix wrapped-line whitespace, and
      join lines into clean readable text.
    </div>

    <div class="input-section">
      <label class="section-label" for="input">Terminal output</label>
      <textarea
        id="input"
        placeholder="Paste your Claude Code terminal text here..."
        autofocus
      ></textarea>
    </div>

    <div class="output-section">
      <div class="output-header">
        <span class="section-label" style="margin-bottom: 0"
          >Cleaned output</span
        >
      </div>
      <pre id="output"></pre>
      <div class="button-row">
        <button id="copyBtn">Copy to clipboard</button>
        <button class="secondary" id="clearBtn">Clear</button>
        <span class="copied-msg" id="copiedMsg">Copied!</span>
      </div>
    </div>

    <script>
      const input = document.getElementById("input");
      const output = document.getElementById("output");
      const copyBtn = document.getElementById("copyBtn");
      const clearBtn = document.getElementById("clearBtn");
      const copiedMsg = document.getElementById("copiedMsg");

      function cleanup(text) {
        // Remove leading ❯ prompt (with optional space)
        text = text.replace(/^❯\s*/gm, "");

        const lines = text.split("\n");

        // Group lines into paragraphs separated by blank lines
        const paragraphs = [];
        let current = [];

        for (const line of lines) {
          if (line.trim() === "") {
            if (current.length) {
              paragraphs.push(current);
              current = [];
            }
          } else {
            current.push(line.trim());
          }
        }
        if (current.length) {
          paragraphs.push(current);
        }

        // Join lines within each paragraph with a single space
        return paragraphs
          .map((p) => p.join(" ").replace(/\s{2,}/g, " "))
          .join("\n\n");
      }

      input.addEventListener("input", () => {
        output.textContent = cleanup(input.value);
      });

      copyBtn.addEventListener("click", () => {
        const text = output.textContent;
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => {
          copiedMsg.classList.add("visible");
          setTimeout(() => {
            copiedMsg.classList.remove("visible");
          }, 1500);
        });
      });

      clearBtn.addEventListener("click", () => {
        input.value = "";
        output.textContent = "";
        input.focus();
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OCR Reader</title>
    <style>
      /* =========================
         CSS Styles
         ========================= */

      /* Reset and base styles */
      * {
        box-sizing: border-box;
      }

      body {
        font-family: Helvetica, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Arial, sans-serif;
        line-height: 1.6;
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
        color: #24292e;
        background: #ffffff;
      }

      h1 {
        border-bottom: 1px solid #eaecef;
        padding-bottom: 0.3em;
        margin-top: 0;
        font-size: 32px;
        font-weight: 600;
      }

      h2 {
        margin-top: 0;
        margin-bottom: 12px;
        font-size: 20px;
        font-weight: 600;
        color: #24292e;
      }

      /* Layout */
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: #0366d6;
        text-decoration: none;
        font-size: 14px;
      }

      .back-link:hover {
        text-decoration: underline;
      }

      .controls {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 16px;
        flex-wrap: wrap;
        justify-content: space-between;
      }

      .controls-left {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .controls-right {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .upload-section {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 16px;
        align-items: start;
      }

      @media (max-width: 768px) {
        .upload-section {
          grid-template-columns: 1fr;
        }
      }

      .drop-zone {
        border: 2px dashed #d1d5da;
        border-radius: 6px;
        padding: 24px;
        text-align: center;
        background: #fafbfc;
        cursor: pointer;
        transition: all 0.2s;
      }

      .drop-zone:hover {
        border-color: #0366d6;
        background: #f6f8fa;
      }

      .drop-zone.drag-over {
        border-color: #0366d6;
        background: #e6f2ff;
      }

      .drop-zone p {
        margin: 8px 0;
        color: #586069;
      }

      .status-section {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .content-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 16px;
      }

      @media (max-width: 900px) {
        .content-container {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        background: #f6f8fa;
        padding: 16px;
        border-radius: 6px;
        border: 1px solid #e1e4e8;
        display: flex;
        flex-direction: column;
        min-height: 500px;
      }

      .panel-content {
        flex: 1;
        background: #ffffff;
        border-radius: 6px;
        border: 1px solid #e1e4e8;
        padding: 12px;
        overflow: auto;
        margin-bottom: 12px;
      }

      .image-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 400px;
      }

      .image-container img,
      .image-container canvas {
        max-width: 100%;
        height: auto;
        border-radius: 3px;
      }

      .text-output {
        white-space: pre-wrap;
        word-wrap: break-word;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo,
          monospace;
        font-size: 12px;
        color: #24292e;
        min-height: 400px;
      }

      .text-output:empty::before {
        content: "Extracted text will appear here...";
        color: #959da5;
        font-style: italic;
      }

      /* Components */
      .language-selector {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 16px;
      }

      .language-selector label {
        font-size: 14px;
        font-weight: 600;
        color: #24292e;
      }

      .language-selector select {
        padding: 6px 12px;
        font-size: 14px;
        border: 1px solid #d1d5da;
        border-radius: 6px;
        background: #ffffff;
        color: #24292e;
        cursor: pointer;
        font-family: Helvetica, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Arial, sans-serif;
      }

      .language-selector select:focus {
        outline: none;
        border-color: #0366d6;
      }

      .file-name {
        font-size: 14px;
        color: #24292e;
        font-weight: 600;
        padding: 8px 12px;
        background: #f6f8fa;
        border-radius: 6px;
        border: 1px solid #e1e4e8;
      }

      .file-name.hidden {
        display: none;
      }

      .status-section .status {
        margin-bottom: 0;
      }

      .status-section .progress-bar {
        margin: 0;
      }

      input[type="file"] {
        display: none;
      }

      .btn {
        background: #fafbfc;
        color: #24292e;
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid rgba(27, 31, 35, 0.15);
        cursor: pointer;
        font-size: 14px;
        line-height: 20px;
        text-decoration: none;
        font-family: Helvetica, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Arial, sans-serif;
        display: inline-block;
      }

      .btn:hover {
        background: #f3f4f6;
      }

      .btn.primary {
        background: #0366d6;
        color: #fff;
        border: 1px solid rgba(27, 31, 35, 0.15);
      }

      .btn.primary:hover {
        background: #0256c5;
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn:disabled:hover {
        background: #fafbfc;
      }

      .btn.primary:disabled:hover {
        background: #0366d6;
      }

      .status {
        padding: 12px;
        border-radius: 6px;
        margin-bottom: 16px;
        font-size: 14px;
      }

      .status.info {
        background: #e6f2ff;
        border: 1px solid #0366d6;
        color: #0366d6;
      }

      .status.success {
        background: #dcffe4;
        border: 1px solid #28a745;
        color: #28a745;
      }

      .status.error {
        background: #ffe6e6;
        border: 1px solid #d73a49;
        color: #d73a49;
      }

      .status.warning {
        background: #fff8e6;
        border: 1px solid #f9a825;
        color: #f57c00;
      }

      .status.hidden {
        display: none;
      }

      .quality-info {
        font-size: 13px;
        color: #586069;
        padding: 8px 12px;
        background: #f6f8fa;
        border-radius: 6px;
        border: 1px solid #e1e4e8;
        margin-bottom: 12px;
      }

      .quality-info.hidden {
        display: none;
      }

      .quality-info strong {
        color: #24292e;
      }

      .confidence-bar {
        width: 100%;
        height: 8px;
        background: #e1e4e8;
        border-radius: 4px;
        overflow: hidden;
        margin-top: 4px;
      }

      .confidence-fill {
        height: 100%;
        transition: width 0.3s, background-color 0.3s;
      }

      .confidence-fill.high {
        background: #28a745;
      }

      .confidence-fill.medium {
        background: #f9a825;
      }

      .confidence-fill.low {
        background: #d73a49;
      }

      .progress-bar {
        width: 100%;
        height: 20px;
        background: #e1e4e8;
        border-radius: 10px;
        overflow: hidden;
        margin: 12px 0;
      }

      .progress-fill {
        height: 100%;
        background: #0366d6;
        transition: width 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 12px;
        font-weight: 600;
      }

      .info-text {
        font-size: 13px;
        color: #586069;
        margin-bottom: 12px;
      }

      .page-info {
        font-size: 14px;
        color: #586069;
        margin: 0 8px;
      }

      /* Utilities */
      .hidden {
        display: none !important;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <!-- =========================
         HTML Structure
         ========================= -->

    <a href="index.html" class="back-link">← Back to Browser Tools</a>

    <h1>OCR Reader</h1>

    <div class="info-text">
      Extract text from images (JPG, PNG, GIF, BMP, WebP) and PDF files using
      optical character recognition. All processing happens in your browser.
    </div>

    <div class="language-selector">
      <label for="languageSelect">OCR Language:</label>
      <select id="languageSelect">
        <option value="eng" selected>English</option>
        <option value="ara">Arabic</option>
        <option value="ben">Bengali</option>
        <option value="chi_sim">Chinese (Simplified)</option>
        <option value="chi_tra">Chinese (Traditional)</option>
        <option value="nld">Dutch</option>
        <option value="fra">French</option>
        <option value="deu">German</option>
        <option value="hin">Hindi</option>
        <option value="ind">Indonesian</option>
        <option value="ita">Italian</option>
        <option value="jpn">Japanese</option>
        <option value="kor">Korean</option>
        <option value="por">Portuguese</option>
        <option value="rus">Russian</option>
        <option value="spa">Spanish</option>
        <option value="tur">Turkish</option>
        <option value="vie">Vietnamese</option>
      </select>
      <label for="layoutSelect">Page Layout:</label>
      <select id="layoutSelect">
        <option value="single">Single Column</option>
        <option value="auto">Auto-detect Columns</option>
        <option value="two">Two Columns</option>
      </select>
    </div>

    <div class="upload-section">
      <div class="drop-zone" id="dropZone">
        <p><strong>Drop a file here or click to browse</strong></p>
        <label for="fileInput" class="btn primary">Choose File</label>
        <input type="file" id="fileInput" accept="image/*,application/pdf" />
        <p style="margin-top: 12px; font-size: 12px; color: #959da5">
          Supports: JPG, PNG, GIF, BMP, WebP, PDF
        </p>
      </div>

      <div class="status-section">
        <div id="fileName" class="file-name hidden"></div>

        <div id="status" class="status hidden"></div>

        <div id="qualityInfo" class="quality-info hidden"></div>

        <div id="progressContainer" class="hidden">
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill" style="width: 0%">
              0%
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="controls hidden" id="controls">
      <div class="controls-left">
        <button class="btn" id="clearBtn">Clear</button>
        <button class="btn primary hidden" id="processAllBtn">
          Process All Pages
        </button>
        <button class="btn hidden" id="prevPageBtn" disabled>Previous</button>
        <span class="page-info hidden" id="pageInfo">Page 1 of 1</span>
        <button class="btn hidden" id="nextPageBtn" disabled>Next</button>
      </div>
      <div class="controls-right">
        <button class="btn primary" id="copyBtn" disabled>Copy Page</button>
        <button class="btn primary" id="downloadBtn" disabled>
          Download Page
        </button>
        <button class="btn primary hidden" id="downloadDocBtn" disabled>
          Download Document
        </button>
      </div>
    </div>

    <div class="content-container hidden" id="contentContainer">
      <div class="panel">
        <h2>Original</h2>
        <div class="panel-content">
          <div class="image-container" id="imageContainer"></div>
        </div>
      </div>

      <div class="panel">
        <h2>Extracted Text</h2>
        <div class="panel-content">
          <div class="text-output" id="textOutput"></div>
        </div>
      </div>
    </div>

    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>

    <script>
      /* =========================
         JavaScript
         ========================= */

      // Configure PDF.js worker
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";

      // State variables
      let currentFile = null;
      let currentFileType = null;
      let pdfDocument = null;
      let currentPage = 1;
      let totalPages = 1;
      let allPagesText = [];
      let allPagesConfidence = [];

      // DOM elements
      const dropZone = document.getElementById("dropZone");
      const fileInput = document.getElementById("fileInput");
      const languageSelect = document.getElementById("languageSelect");
      const layoutSelect = document.getElementById("layoutSelect");
      const fileName = document.getElementById("fileName");
      const status = document.getElementById("status");
      const qualityInfo = document.getElementById("qualityInfo");
      const progressContainer = document.getElementById("progressContainer");
      const progressFill = document.getElementById("progressFill");
      const controls = document.getElementById("controls");
      const pageControls = document.getElementById("pageControls");
      const contentContainer = document.getElementById("contentContainer");
      const imageContainer = document.getElementById("imageContainer");
      const textOutput = document.getElementById("textOutput");
      const clearBtn = document.getElementById("clearBtn");
      const copyBtn = document.getElementById("copyBtn");
      const downloadBtn = document.getElementById("downloadBtn");
      const downloadDocBtn = document.getElementById("downloadDocBtn");
      const prevPageBtn = document.getElementById("prevPageBtn");
      const nextPageBtn = document.getElementById("nextPageBtn");
      const pageInfo = document.getElementById("pageInfo");
      const processAllBtn = document.getElementById("processAllBtn");

      // Utility functions
      function showStatus(message, type = "info") {
        status.textContent = message;
        status.className = `status ${type}`;
      }

      function hideStatus() {
        status.className = "status hidden";
      }

      function showProgress(percent) {
        progressContainer.classList.remove("hidden");
        progressFill.style.width = `${percent}%`;
        progressFill.textContent = `${Math.round(percent)}%`;
      }

      function hideProgress() {
        progressContainer.classList.add("hidden");
        progressFill.style.width = "0%";
      }

      function clearAll() {
        currentFile = null;
        currentFileType = null;
        pdfDocument = null;
        currentPage = 1;
        totalPages = 1;
        allPagesText = [];
        allPagesConfidence = [];
        imageContainer.innerHTML = "";
        textOutput.textContent = "";
        fileInput.value = "";
        fileName.classList.add("hidden");
        fileName.textContent = "";
        qualityInfo.classList.add("hidden");
        qualityInfo.innerHTML = "";
        contentContainer.classList.add("hidden");
        controls.classList.add("hidden");
        processAllBtn.classList.add("hidden");
        prevPageBtn.classList.add("hidden");
        nextPageBtn.classList.add("hidden");
        pageInfo.classList.add("hidden");
        downloadDocBtn.classList.add("hidden");
        copyBtn.disabled = true;
        downloadBtn.disabled = true;
        downloadDocBtn.disabled = true;
        hideStatus();
        hideProgress();
      }

      async function performOCR(imageSource, label = "Performing OCR... This may take a moment.") {
        try {
          const selectedLanguage = languageSelect.value;
          showStatus(label, "info");
          showProgress(0);

          const worker = await Tesseract.createWorker(selectedLanguage, 1, {
            logger: (m) => {
              if (m.status === "recognizing text") {
                showProgress(m.progress * 100);
              }
            },
          });

          const {
            data: { text, confidence },
          } = await worker.recognize(imageSource);
          await worker.terminate();

          hideProgress();
          return { text, confidence };
        } catch (error) {
          hideProgress();
          throw error;
        }
      }

      function detectColumnSplit(canvas) {
        const ctx = canvas.getContext("2d");
        const { width, height } = canvas;

        // Sample the middle 50% of height to skip full-width headers/footers
        const yStart = Math.floor(height * 0.25);
        const yEnd = Math.floor(height * 0.75);
        const sampleHeight = yEnd - yStart;

        const imageData = ctx.getImageData(0, yStart, width, sampleHeight);
        const pixels = imageData.data;

        // Build vertical density histogram: fraction of dark pixels per column strip
        const histogram = new Float32Array(width);
        for (let x = 0; x < width; x++) {
          let dark = 0;
          for (let y = 0; y < sampleHeight; y++) {
            const i = (y * width + x) * 4;
            if ((pixels[i] + pixels[i + 1] + pixels[i + 2]) / 3 < 180) dark++;
          }
          histogram[x] = dark / sampleHeight;
        }

        // Smooth with a moving average to reduce noise from thin vertical lines
        const smoothed = new Float32Array(width);
        const halfKernel = Math.max(4, Math.floor(width * 0.01));
        for (let x = 0; x < width; x++) {
          let sum = 0, count = 0;
          for (let k = -halfKernel; k <= halfKernel; k++) {
            const xi = x + k;
            if (xi >= 0 && xi < width) { sum += histogram[xi]; count++; }
          }
          smoothed[x] = sum / count;
        }

        // Search the central 30-70% of page width for the lowest-density valley
        const searchStart = Math.floor(width * 0.30);
        const searchEnd = Math.floor(width * 0.70);

        let minVal = Infinity, splitX = -1;
        for (let x = searchStart; x < searchEnd; x++) {
          if (smoothed[x] < minVal) { minVal = smoothed[x]; splitX = x; }
        }

        // Require the valley to be nearly empty AND both sides to have real text
        let leftPeak = 0, rightPeak = 0;
        for (let x = searchStart; x < splitX; x++) leftPeak = Math.max(leftPeak, smoothed[x]);
        for (let x = splitX; x < searchEnd; x++) rightPeak = Math.max(rightPeak, smoothed[x]);

        return (minVal < 0.02 && leftPeak > 0.03 && rightPeak > 0.03) ? splitX : null;
      }

      function extractColumnCanvas(source, x, w) {
        const col = document.createElement("canvas");
        col.width = w;
        col.height = source.height;
        col.getContext("2d").drawImage(source, x, 0, w, source.height, 0, 0, w, source.height);
        return col;
      }

      async function performOCRWithLayout(canvas) {
        const layout = layoutSelect.value;

        let splitX = null;
        if (layout === "two") {
          splitX = Math.floor(canvas.width / 2);
        } else if (layout === "auto") {
          splitX = detectColumnSplit(canvas);
        }

        if (splitX === null) {
          return performOCR(canvas);
        }

        const leftCanvas = extractColumnCanvas(canvas, 0, splitX);
        const rightCanvas = extractColumnCanvas(canvas, splitX, canvas.width - splitX);

        const leftResult = await performOCR(leftCanvas, "Processing left column...");
        const rightResult = await performOCR(rightCanvas, "Processing right column...");

        return {
          text: leftResult.text.trimEnd() + "\n\n" + rightResult.text.trimStart(),
          confidence: (leftResult.confidence + rightResult.confidence) / 2,
        };
      }

      function checkImageQuality(img) {
        const warnings = [];
        const width = img.naturalWidth || img.width;
        const height = img.naturalHeight || img.height;
        const pixels = width * height;

        // Check resolution
        if (pixels < 500000) {
          // Less than 0.5 megapixels
          warnings.push(
            "⚠️ Low resolution image detected. For best results, use images with at least 300 DPI or 1200x800 pixels."
          );
        }

        // Check dimensions
        if (width < 800 || height < 600) {
          warnings.push(
            "⚠️ Small image dimensions. Text may be difficult to recognize accurately."
          );
        }

        return warnings;
      }

      function displayQualityInfo(confidence, warnings = []) {
        let html = "";

        // Show confidence score
        if (confidence !== undefined && confidence !== null) {
          const confidencePercent = Math.round(confidence);
          let confidenceClass = "high";
          let confidenceLabel = "High";

          if (confidence < 60) {
            confidenceClass = "low";
            confidenceLabel = "Low";
          } else if (confidence < 80) {
            confidenceClass = "medium";
            confidenceLabel = "Medium";
          }

          html += `
            <div>
              <strong>OCR Confidence:</strong> ${confidencePercent}% (${confidenceLabel})
              <div class="confidence-bar">
                <div class="confidence-fill ${confidenceClass}" style="width: ${confidencePercent}%"></div>
              </div>
            </div>
          `;

          if (confidence < 80) {
            html += `<div style="margin-top: 8px; color: #f57c00;">💡 Low confidence may indicate poor image quality, unusual fonts, or unclear text.</div>`;
          }
        }

        // Show quality warnings
        if (warnings.length > 0) {
          if (html)
            html +=
              "<hr style='margin: 12px 0; border: none; border-top: 1px solid #e1e4e8;'>";
          html += warnings
            .map((w) => `<div style="margin-bottom: 4px;">${w}</div>`)
            .join("");
        }

        if (html) {
          qualityInfo.innerHTML = html;
          qualityInfo.classList.remove("hidden");
        } else {
          qualityInfo.classList.add("hidden");
        }
      }

      async function handleImage(file) {
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            // Display image
            const img = document.createElement("img");
            img.src = e.target.result;

            // Wait for image to load to check quality
            img.onload = async () => {
              const warnings = checkImageQuality(img);
              if (warnings.length > 0) {
                displayQualityInfo(null, warnings);
              }

              // Draw to an offscreen canvas so column splitting can read pixel data
              const canvas = document.createElement("canvas");
              canvas.width = img.naturalWidth || img.width;
              canvas.height = img.naturalHeight || img.height;
              canvas.getContext("2d").drawImage(img, 0, 0);

              const result = await performOCRWithLayout(canvas);
              textOutput.textContent = result.text;

              // Display quality info with confidence
              displayQualityInfo(result.confidence, warnings);

              if (result.text.trim()) {
                showStatus("OCR completed successfully!", "success");
                copyBtn.disabled = false;
                downloadBtn.disabled = false;
              } else {
                showStatus("No text found in image.", "info");
              }
            };

            imageContainer.innerHTML = "";
            imageContainer.appendChild(img);

            contentContainer.classList.remove("hidden");
            controls.classList.remove("hidden");
          } catch (error) {
            showStatus(`Error processing image: ${error.message}`, "error");
            console.error(error);
          }
        };
        reader.readAsDataURL(file);
      }

      async function renderPDFPage(pageNum) {
        try {
          const page = await pdfDocument.getPage(pageNum);
          const scale = 1.5;
          const viewport = page.getViewport({ scale });

          const canvas = document.createElement("canvas");
          const context = canvas.getContext("2d");
          canvas.height = viewport.height;
          canvas.width = viewport.width;

          await page.render({
            canvasContext: context,
            viewport: viewport,
          }).promise;

          imageContainer.innerHTML = "";
          imageContainer.appendChild(canvas);

          return canvas;
        } catch (error) {
          throw new Error(`Failed to render page: ${error.message}`);
        }
      }

      async function processPDFPage(pageNum) {
        try {
          currentPage = pageNum;
          updatePageControls();

          showStatus(`Processing page ${pageNum} of ${totalPages}...`, "info");

          // Render the page
          const canvas = await renderPDFPage(pageNum);

          // Check if we already have text for this page
          if (allPagesText[pageNum - 1] !== undefined) {
            textOutput.textContent = allPagesText[pageNum - 1];

            // Display stored confidence for this page
            if (allPagesConfidence[pageNum - 1] !== undefined) {
              displayQualityInfo(allPagesConfidence[pageNum - 1]);
            }

            showStatus(`Showing page ${pageNum} of ${totalPages}`, "success");
            copyBtn.disabled = false;
            downloadBtn.disabled = false;
            checkAllPagesProcessed();
            return;
          }

          // Perform OCR on the canvas
          const result = await performOCRWithLayout(canvas);
          allPagesText[pageNum - 1] = result.text;
          allPagesConfidence[pageNum - 1] = result.confidence;
          textOutput.textContent = result.text;

          // Display confidence for this page
          displayQualityInfo(result.confidence);

          if (result.text.trim()) {
            showStatus(`Page ${pageNum} processed successfully!`, "success");
            copyBtn.disabled = false;
            downloadBtn.disabled = false;
          } else {
            showStatus(`No text found on page ${pageNum}.`, "info");
          }

          // Check if all pages have been processed
          checkAllPagesProcessed();
        } catch (error) {
          showStatus(`Error processing page: ${error.message}`, "error");
          console.error(error);
        }
      }

      function checkAllPagesProcessed() {
        // Check if all pages have been processed
        if (totalPages > 1 && allPagesText.length === totalPages) {
          const allProcessed = allPagesText.every(
            (text) => text !== undefined && text !== null
          );
          if (allProcessed) {
            downloadDocBtn.disabled = false;
          }
        }
      }

      async function processAllPDFPages() {
        try {
          processAllBtn.disabled = true;

          for (let i = 1; i <= totalPages; i++) {
            showStatus(`Processing page ${i} of ${totalPages}...`, "info");

            // Render the page
            await renderPDFPage(i);
            const canvas = imageContainer.querySelector("canvas");

            // Perform OCR
            const result = await performOCRWithLayout(canvas);
            allPagesText[i - 1] = result.text;
            allPagesConfidence[i - 1] = result.confidence;

            currentPage = i;
            updatePageControls();
            textOutput.textContent = result.text;
            displayQualityInfo(result.confidence);
          }

          // Return to first page display and show its text
          await renderPDFPage(1);
          currentPage = 1;
          textOutput.textContent = allPagesText[0];

          // Display confidence for first page
          if (allPagesConfidence[0] !== undefined) {
            displayQualityInfo(allPagesConfidence[0]);
          }

          updatePageControls();

          showStatus(
            `All ${totalPages} pages processed successfully!`,
            "success"
          );
          copyBtn.disabled = false;
          downloadBtn.disabled = false;
          downloadDocBtn.disabled = false;
          processAllBtn.disabled = false;
        } catch (error) {
          showStatus(`Error processing all pages: ${error.message}`, "error");
          console.error(error);
          processAllBtn.disabled = false;
        }
      }

      function updatePageControls() {
        pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
        prevPageBtn.disabled = currentPage === 1;
        nextPageBtn.disabled = currentPage === totalPages;
      }

      async function reprocessCurrentContent() {
        if (!currentFile) return;

        allPagesText = [];
        allPagesConfidence = [];
        textOutput.textContent = "";
        qualityInfo.classList.add("hidden");
        copyBtn.disabled = true;
        downloadBtn.disabled = true;
        downloadDocBtn.disabled = true;

        if (currentFileType === "image") {
          const img = imageContainer.querySelector("img");
          if (!img) return;
          const canvas = document.createElement("canvas");
          canvas.width = img.naturalWidth || img.width;
          canvas.height = img.naturalHeight || img.height;
          canvas.getContext("2d").drawImage(img, 0, 0);
          try {
            const result = await performOCRWithLayout(canvas);
            textOutput.textContent = result.text;
            displayQualityInfo(result.confidence);
            if (result.text.trim()) {
              showStatus("OCR completed successfully!", "success");
              copyBtn.disabled = false;
              downloadBtn.disabled = false;
            } else {
              showStatus("No text found in image.", "info");
            }
          } catch (error) {
            showStatus(`Error processing image: ${error.message}`, "error");
          }
        } else if (currentFileType === "pdf") {
          processPDFPage(currentPage);
        }
      }

      async function handlePDF(file) {
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const arrayBuffer = e.target.result;
            pdfDocument = await pdfjsLib.getDocument({
              data: new Uint8Array(arrayBuffer),
              cMapUrl:
                "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/cmaps/",
              cMapPacked: true,
              standardFontDataUrl:
                "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/standard_fonts/",
            }).promise;
            totalPages = pdfDocument.numPages;

            contentContainer.classList.remove("hidden");
            controls.classList.remove("hidden");

            if (totalPages > 1) {
              processAllBtn.classList.remove("hidden");
              prevPageBtn.classList.remove("hidden");
              nextPageBtn.classList.remove("hidden");
              pageInfo.classList.remove("hidden");
              downloadDocBtn.classList.remove("hidden");
            }

            // Process first page
            await processPDFPage(1);
          } catch (error) {
            showStatus(`Error loading PDF: ${error.message}`, "error");
            console.error(error);
          }
        };
        reader.readAsArrayBuffer(file);
      }

      function handleFile(file) {
        if (!file) return;

        currentFile = file;
        clearAll();
        currentFile = file;

        // Display file name
        fileName.textContent = `Processing: ${file.name}`;
        fileName.classList.remove("hidden");

        const fileType = file.type;

        if (fileType.startsWith("image/")) {
          currentFileType = "image";
          handleImage(file);
        } else if (fileType === "application/pdf") {
          currentFileType = "pdf";
          handlePDF(file);
        } else {
          showStatus(
            "Unsupported file type. Please upload an image or PDF.",
            "error"
          );
        }
      }

      function downloadText() {
        const text = textOutput.textContent;
        if (!text) return;

        const blob = new Blob([text], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = currentFile
          ? currentFile.name.replace(/\.[^/.]+$/, "-page.txt")
          : "extracted-page.txt";
        a.click();
        URL.revokeObjectURL(url);
      }

      function downloadDocument() {
        if (!allPagesText.length) return;

        // Combine all pages text, trimming whitespace from each page
        const combinedText = allPagesText
          .map((text) => text.trim())
          .filter((text) => text)
          .join("\n\n");

        const blob = new Blob([combinedText], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = currentFile
          ? currentFile.name.replace(/\.[^/.]+$/, ".txt")
          : "extracted-document.txt";
        a.click();
        URL.revokeObjectURL(url);
      }

      function copyText() {
        const text = textOutput.textContent;
        if (!text) return;

        navigator.clipboard
          .writeText(text)
          .then(() => {
            const originalText = copyBtn.textContent;
            copyBtn.textContent = "Copied!";
            setTimeout(() => {
              copyBtn.textContent = originalText;
            }, 2000);
          })
          .catch((err) => {
            showStatus(`Failed to copy: ${err.message}`, "error");
          });
      }

      // Event handlers
      dropZone.addEventListener("click", () => {
        fileInput.click();
      });

      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("drag-over");
      });

      dropZone.addEventListener("dragleave", () => {
        dropZone.classList.remove("drag-over");
      });

      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("drag-over");
        const files = e.dataTransfer.files;
        if (files.length > 0) {
          handleFile(files[0]);
        }
      });

      fileInput.addEventListener("change", (e) => {
        const files = e.target.files;
        if (files.length > 0) {
          handleFile(files[0]);
        }
      });

      clearBtn.addEventListener("click", clearAll);
      copyBtn.addEventListener("click", copyText);
      downloadBtn.addEventListener("click", downloadText);
      downloadDocBtn.addEventListener("click", downloadDocument);

      prevPageBtn.addEventListener("click", () => {
        if (currentPage > 1) {
          processPDFPage(currentPage - 1);
        }
      });

      nextPageBtn.addEventListener("click", () => {
        if (currentPage < totalPages) {
          processPDFPage(currentPage + 1);
        }
      });

      processAllBtn.addEventListener("click", processAllPDFPages);

      languageSelect.addEventListener("change", reprocessCurrentContent);
      layoutSelect.addEventListener("change", reprocessCurrentContent);

      // Prevent default drag and drop on the whole page
      window.addEventListener("dragover", (e) => e.preventDefault());
      window.addEventListener("drop", (e) => e.preventDefault());
    </script>
  </body>
</html>
